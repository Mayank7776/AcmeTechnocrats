<!-- Top Bar -->
<div class="top-bar">
  <div class="container top-bar-container">
    <div class="contact-info">
      <a href="mailto:acmetech23@gmail.com">
        <i class="fa-solid fa-envelope"></i> acmetech23@gmail.com
      </a>
      <a href="tel:+918586864702">
        <i class="fa-solid fa-phone"></i> +91-8586864702
      </a>
    </div>
    <div class="social-links">
      <a [href]="facebookUrl" target="_blank" rel="noopener" aria-label="Facebook"><i class="fa-brands fa-facebook-f"></i></a>
      <a [href]="twitterUrl" target="_blank" rel="noopener" aria-label="Twitter"><i class="fa-brands fa-twitter"></i></a>
      <a [href]="instagramUrl" target="_blank" rel="noopener" aria-label="Instagram"><i class="fa-brands fa-instagram"></i></a>
      <a [href]="linkedinUrl" target="_blank" rel="noopener" aria-label="LinkedIn"><i class="fa-brands fa-linkedin-in"></i></a>
    </div>
  </div>
</div>

<!-- Main Navigation -->
<header class="main-header">
  <div class="container header-container">
    <a routerLink="/" class="logo-container header-logo" (click)="closeMobileMenu()">
      <img src="AcmeLogo.png" alt="Acme Technocrats Logo" class="logo-img">
      <div class="logo-text">
        <span class="logo-main"><span class="logo-small">acme</span><span class="logo-bold">TECHNOCRATS</span></span>
        <span class="logo-slogan">DREAM BIG BUILD BETTER</span>
      </div>
    </a>

    <!-- Desktop Navigation -->
    <nav class="desktop-nav">
      <ul>
        <li><a routerLink="/" routerLinkActive="active" [routerLinkActiveOptions]="{exact: true}">Home</a></li>
        <li><a routerLink="/about" routerLinkActive="active">About Us</a></li>
        <li><a routerLink="/services" routerLinkActive="active">Services</a></li>
        <li><a routerLink="/projects" routerLinkActive="active">Projects</a></li>
        <li><a routerLink="/gallery" routerLinkActive="active">Gallery</a></li>
      </ul>
      <a routerLink="/about" class="btn btn-outline-gold header-cta">Contact Us</a>
    </nav>

    <!-- Mobile Hamburger Menu Button -->
    <button class="mobile-toggle" (click)="toggleMobileMenu()" [attr.aria-expanded]="isMobileMenuOpen()" aria-label="Toggle Navigation">
      <span class="bar" [class.open]="isMobileMenuOpen()"></span>
      <span class="bar" [class.open]="isMobileMenuOpen()"></span>
      <span class="bar" [class.open]="isMobileMenuOpen()"></span>
    </button>
  </div>
</header>

<!-- Mobile Navigation Drawer -->
<div class="mobile-nav" [class.show]="isMobileMenuOpen()">
  <ul>
    <li><a routerLink="/" routerLinkActive="active" [routerLinkActiveOptions]="{exact: true}" (click)="closeMobileMenu()">Home</a></li>
    <li><a routerLink="/about" routerLinkActive="active" (click)="closeMobileMenu()">About Us</a></li>
    <li><a routerLink="/services" routerLinkActive="active" (click)="closeMobileMenu()">Services</a></li>
    <li><a routerLink="/projects" routerLinkActive="active" (click)="closeMobileMenu()">Projects</a></li>
    <li><a routerLink="/gallery" routerLinkActive="active" (click)="closeMobileMenu()">Gallery</a></li>
    <li><a routerLink="/about" class="btn btn-primary" (click)="closeMobileMenu()" style="width: 100%; margin-top: 1rem;">Get In Touch</a></li>
  </ul>
</div>
<div class="mobile-nav-overlay" [class.show]="isMobileMenuOpen()" (click)="closeMobileMenu()"></div>
